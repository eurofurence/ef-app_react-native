name: Build App
on:
    workflow_dispatch:
        inputs:
            build_mode:
                type: choice
                description: Where the build runs. Cloud uses EAS servers (pair with ubuntu-latest); local uses this runner (iOS needs macos-26)
                options:
                    - cloud
                    - local
            os:
                type: choice
                description: OS to build on. Ubuntu is faster, MacOS supports local iOS builds
                options:
                    - ubuntu-latest
                    - macos-26
                    - macos-latest
            platform:
                type: choice
                description: Platform to build for
                options:
                    - android
                    - ios
            profile:
                type: choice
                description: Build profile to use
                options:
                    - development
                    - preview
                    - production
            should_submit:
                type: boolean
                description: Whether to perform the submit step
                required: true
                default: true
jobs:
    build:
        permissions:
            contents: write
        runs-on: ${{ github.event.inputs.os }}
        strategy:
            matrix:
                node: [22.x]
        steps:
            - name: 🏗 Setup repo
              uses: actions/checkout@v4

            - name: 🏗 Setup Bun
              uses: oven-sh/setup-bun@v2
              with:
                  bun-version: latest

            - name: 🏗 Setup Node
              uses: actions/setup-node@v4
              with:
                  node-version: ${{ matrix.node }}

            - name: 🏗 Setup Java
              if: ${{ github.event.inputs.platform == 'android' }}
              uses: actions/setup-java@v3
              with:
                  distribution: 'temurin'
                  java-version: '21'

            - name: 🏗 Setup Expo and EAS
              uses: expo/expo-github-action@v8
              with:
                  token: ${{ secrets.EXPO_TOKEN }}
                  eas-version: latest

            # macos runners default to an Xcode whose iOS SDK predates Apple's
            # submission floor, so pin the newest one on the image explicitly.
            - name: 🏗 Select Xcode
              if: ${{ inputs.build_mode == 'local' && inputs.platform == 'ios' }}
              run: |
                  sudo xcode-select -s /Applications/Xcode_26.6.app
                  xcodebuild -version
                  xcodebuild -showsdks | grep iphoneos

            - name: 📦 Install dependencies
              run: bun install

            - name: 👷 Build app on EAS
              if: ${{ inputs.build_mode == 'cloud' }}
              run: |
                  eas build \
                    --non-interactive \
                    --platform=${{ inputs.platform }} \
                    --profile=${{ inputs.profile }}

            - name: 👷 Build app on runner
              if: ${{ inputs.build_mode == 'local' }}
              run: |
                  eas build --local \
                    --non-interactive \
                    --output=./app-build \
                    --platform=${{ inputs.platform }} \
                    --profile=${{ inputs.profile }}

            - name: 📤 Upload build
              if: ${{ inputs.build_mode == 'local' }}
              uses: actions/upload-artifact@v4
              with:
                  name: ${{ inputs.platform }}-build
                  path: app-build

            - name: 🚢 Submit EAS build
              if: ${{ inputs.should_submit && inputs.build_mode == 'cloud' }}
              run: eas submit --non-interactive -p ${{ inputs.platform }} --profile ${{ inputs.profile }} --latest

            - name: 🚢 Submit runner build
              if: ${{ inputs.should_submit && inputs.build_mode == 'local' }}
              run: eas submit --non-interactive -p ${{ inputs.platform }} --profile ${{ inputs.profile }} --path app-build

            - name: 🔄 Convert AAB to APK
              if: ${{ inputs.build_mode == 'local' && inputs.platform == 'android' && inputs.profile == 'production' }}
              run: |
                # Download bundletool
                curl -L https://github.com/google/bundletool/releases/download/1.15.6/bundletool-all-1.15.6.jar -o bundletool.jar
                
                # Convert AAB to APK
                java -jar bundletool.jar build-apks --bundle=app-build/*.aab --output=app-build/app.apks --mode=universal
                unzip app-build/app.apks -d app-build/
                mv app-build/universal.apk app-build/app-universal.apk
                
                # Clean up temporary files
                rm app-build/app.apks
                rm bundletool.jar

            - name: 📦 Create GitHub Release
              if: ${{ inputs.build_mode == 'local' && inputs.platform == 'android' && inputs.profile == 'production' }}
              uses: softprops/action-gh-release@v1
              with:
                files: app-build/app-universal.apk
                generate_release_notes: true
                draft: false
                prerelease: false
              env:
                GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
